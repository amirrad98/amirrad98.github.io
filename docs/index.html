<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proto Projects</title>
    <meta
      name="description"
      content="An index of sub-projects published under proto.amrad.ca."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero hero-compact">
        <p class="eyebrow">proto.amrad.ca</p>
        <h1>Project index</h1>
        <p class="lede">
          A simple landing page for every sub-project hosted on this domain.
        </p>
      </header>

      <main class="section">
        <div class="section-heading">
          <p class="eyebrow">Projects</p>
          <h2>Available sub-projects</h2>
          <p class="section-copy">
            Add a new folder under <code>docs/</code> and then add its slug here.
          </p>
        </div>

        <div id="project-list" class="project-list"></div>
      </main>
    </div>

    <script>
      const baseUrl = "https://proto.amrad.ca";
      const projects = [
        {
          slug: "terminal-project",
          name: "Terminal Project",
          description: "Starter example project page published under its own route.",
        },
      ];

      const projectList = document.getElementById("project-list");

      projectList.innerHTML = projects
        .map((project) => {
          const href = `${baseUrl}/${project.slug}/`;

          return `
            <article class="project-row">
              <div>
                <p class="project-slug">/${project.slug}/</p>
                <h3>${project.name}</h3>
                <p class="project-description">${project.description}</p>
              </div>
              <a class="button primary" href="${href}">Open project</a>
            </article>
          `;
        })
        .join("");
    </script>
  </body>
</html>
