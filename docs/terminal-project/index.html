<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Project</title>
    <meta
      name="description"
      content="Terminal Project published under proto.amrad.ca/terminal-project/"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="terminal-page">
        <p class="eyebrow">Sub-project</p>
        <h1>Terminal Project</h1>
        <p class="lede">
          This is an example sub-project page at
          <code>/terminal-project/</code>.
        </p>

        <div class="terminal-window">
          <div class="terminal-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="terminal-body">
            <p><span class="prompt">$</span> pwd</p>
            <p>/proto.amrad.ca/terminal-project</p>
            <p><span class="prompt">$</span> status</p>
            <p>online</p>
            <p><span class="prompt">$</span> next</p>
            <p>Replace this file with the real project app.</p>
          </div>
        </div>

        <div class="hero-actions">
          <a class="button secondary" href="../">Back to project index</a>
        </div>
      </main>
    </div>
  </body>
</html>
